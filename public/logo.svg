<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#ffffff" />
      <stop offset="55%"  style="stop-color:#f5f3ff" />
      <stop offset="100%" style="stop-color:#eff6ff" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="26" fill="url(#bgGrad)" />

  <!-- Phone outline -->
  <rect x="26" y="8" width="68" height="104" rx="14"
    fill="none" stroke="#6C63FF" stroke-width="3.5" />

  <!-- Speaker notch -->
  <rect x="46" y="16" width="28" height="4" rx="2"
    fill="#6C63FF" opacity="0.35" />

  <!-- Home bar -->
  <rect x="45" y="104" width="30" height="3" rx="1.5"
    fill="#6C63FF" opacity="0.35" />

  <!-- Gauge bars — overlapping the phone, bottom-aligned at y=92 -->
  <rect x="35" y="78" width="5" height="14" rx="2.5" fill="#22c55e" />
  <rect x="44" y="74" width="5" height="18" rx="2.5" fill="#22c55e" />
  <rect x="53" y="70" width="5" height="22" rx="2.5" fill="#eab308" />
  <rect x="62" y="66" width="5" height="26" rx="2.5" fill="#eab308" />
  <rect x="71" y="62" width="5" height="30" rx="2.5" fill="#f97316" />
  <rect x="80" y="58" width="5" height="34" rx="2.5" fill="#ef4444" />
</svg>
